spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/learnKafkaDB
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        spring.json:
          trusted.packages: com.example.learnKafka.* #adding the class to the trusted package (to avoid IllegalStateException)
        schema:
          registry:
            url: "http://127.0.0.1:8081"
        specific:
          avro:
            reader: true

server:
  port: 9060



